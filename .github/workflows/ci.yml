name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config \
            libcurl4-openssl-dev nlohmann-json3-dev

      - name: Build
        run: make

      - name: Smoke test (--help)
        run: ./ytmerge --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ytmerge-linux-x86_64
          path: ytmerge

  macos:
    name: macOS (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install nlohmann-json

      - name: Build
        run: make

      - name: Smoke test (--help)
        run: ./ytmerge --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ytmerge-macos-arm64
          path: ytmerge

  windows:
    name: Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            make
            pkgconf
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: Build
        run: make

      - name: Smoke test (--help)
        run: ./ytmerge.exe --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ytmerge-windows-x86_64
          path: ytmerge.exe
